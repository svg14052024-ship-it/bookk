<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>Realistic Book</title>


<style>


.scene{
perspective:3000px;
}

.background{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background-image:url("background_2.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-1;
}


.book{
position:relative;
width:90vw;
height:60vw;
max-width:1200px;
max-height:800px;
transform-style:preserve-3d;
}

/* страница */

.page{
position:absolute;
width:50%;
height:100%;
z-index:10;
top:0;
right:0;
transform-origin:left center;
transform-style:preserve-3d;
transition:transform 1.6s;
cursor:pointer;
overflow:visible;

/* изгиб */
box-shadow:
-8px 0 20px rgba(0,0,0,0.25),
inset -6px 0 12px rgba(0,0,0,0.2);
border-radius:3px;
}
/* переворот */

.page.flipped{
transform:rotateY(-180deg);
box-shadow:
8px 0 20px rgba(0,0,0,0.25),
inset 6px 0 12px rgba(0,0,0,0.25);
}
/* стороны страницы */

.side{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
background-image:url("pageA.png");
background-size:cover;
background-position:center;
backface-visibility:hidden;
overflow:visible;
}
/* задняя сторона */

.side.back{
transform:rotateY(180deg);
}

/* картинки */

/* только фон страницы */
.side > img:not(.book-image){
position:absolute;
top:0;
left:0;
width:146%;
height:103%;
transform: translate(-17%, 0);
object-fit:contain;
}

/* картинка внутри текста */
.book-image{
float:right;
width:200px;      /* меняй размер */
height:auto;
margin:0 0 12px 12px;
border-radius:6px;
position:relative;
transform:none;
}

.side::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to right,
rgba(0,0,0,0.15),
transparent 40%
);
pointer-events:none;
}

/* номер страницы */

.page-number{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:18px;
color:#3b2a17;
}

/* обложка */

.cover{
overflow:hidden;
}

.cover img{
position:absolute;
top:0;
left:0;
width:165%;
height:107%;
transform: translate(-20%, -2%);
object-fit:contain;
}

/* корешок книги */

.spine{
position:absolute;
left:50%;
top:0;
width:120px;
height:100%;
transform:translateX(-50%);
z-index:0;
pointer-events:none;
}


.spine img{
width:100%;
height:100%;
object-fit:cover;
}
/**/



.item{
position:absolute;
pointer-events:none;
z-index:5;
}


.paper1{
left:-70%;
top:30%;
width:100%;
transform:rotate(-10deg);
}



.paper2{
left:60%;
top:-90%;
width:90%;
transform:rotate(15deg);
}

.ink{
right:-45%;
top:2%;
width:40%;
}

.pen{
right:-50%;
top:40%;
width:50%;
transform:rotate(95deg);

}
.ppp{
right:100%;
top:-30%;
width:50%;
transform:rotate(5deg);

}


.ink_{
right:-15%;
top:107%;
width:40%;
}

.pen_{
right:-10%;
top:122%;
width:60%;
transform:rotate(95deg);

}
.ppp_{
right:70%;
top:-70%;
width:55%;
transform:rotate(20deg);

}

.book-shadow{
position:absolute;
width:100%;
max-width:1200px;
height:160px;
bottom:-90px;
left:0;
background:radial-gradient(ellipse at center,
rgba(0,0,0,0.55) 0%,
rgba(0,0,0,0.35) 40%,
rgba(0,0,0,0.1) 65%,
transparent 80%);
filter:blur(35px);
pointer-events:none;
}



@media (max-width: 768px){

.book{
width:95vw;
height:65vw;
}

.page-number{
font-size:14px;
}

}

/* запрет выделения текста */
body{
user-select:none;
-webkit-user-select:none;
-moz-user-select:none;
-ms-user-select:none;
}


body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
/* запрет перетаскивания картинок */
img{
pointer-events:none;
-webkit-user-drag:none;
user-drag:none;
}


.text{
  position:absolute;
  top:2%;
  left:5%;
  width:90%;
  height:94%;

  color:#2b1d0e;
  font-size:18px;
  line-height:1.3.5;

  font-family:serif;
  z-index:100;

  white-space:normal;
  word-break:break-word;
  text-align:justify;

  pointer-events:none;
}

.text p{
  margin: 0 0 10px 0;
  text-indent: 20px; /* красивый отступ как в книге */
}


</style>

<script>

const spine = document.querySelector(".spine");

let fullText =  `


    Նախագծային աշխատանք
Առարկա Գրականություն
Թեմա  «Սասունցի Դավիթ» էպոսի աշխարհագրությունը. իրանան և առասպելական Սասուն
Կազմողներ Վարդան Գևորգյան Սպարտակի
Անդրանիկ Հակոբյան Կորյունի
Նիկոլայ Մկրտչյան Անդրեյ
Վահե Յայլոյան Գարիկի
Ժաննա Թամբալյան Արտյոմի
Նախագծի ղեկավար Արեգնազ Մելիքսեթյան

«Մասունցի Դավիթ» էպոսի աշխարհագրությունը. իրական և առասպելական Սասուն» 
առցանց գրքույկ բառարանը համապարփակ ուղեցույց է, որն ամփոփում է էպոսի
պատմաաշխարհագրական, լեզվական և մշակութային շերտերի հետազոտությունը:
Գրքում տեղ են գտել էպիկական տեղանունների նույնականացումը իրական լանդշաֆտի հետ, Սասնա բարբառի բացատրական
բառարանը և հիմնական խորհրդանիշների (զենք, հանդերձանք, սրբավայրեր)
վերլուծությունը:
Աշխատանքն աչքի է ընկնում տեղեկատվական հարուստ բովանդակությամբ և
հեղինակային նկարազարդումներով, որոնք կամրջում են
ժողովրդական
բանահյուսությունը ժամանակակից գիտական պատկերացումների հետ: Գրքույկը
նախատեսված է հայ գրականությամբ, հայրենագիտությամբ և ազգագրությամբ
հետաքրքրվող լայն շրջանակների համար:





Հայոց ազգային էպոսը
«Էպոսը հայ ցեղի ապրած կյանքի և հոգեկան կարողությունների հոյակապ գանձարանն է ու իր մեծության անհերքելի վկայությունն է աշխարհի առջև»

Հովհաննես Թումանյան

Ազգային էպոսը նկարագրում է տվյալ ազգի կամ էթնոսի ծագումը, զարգացումը և պատմությունը: Այն նաև օգնում է փոխանցել ազգի ինքնորոշման կամ ինքնաճանաչման դրվագները և բազմաթիվ ազգային խորհրդանիշների առաջացման պատմությունը:

Հայկական մշակույթում «Սասնա ծռեր» ազգային էպոսն առանձնահատուկ տեղ է գրավում: Այն ծնունդ է առել Հայկական լեռնաշխարհի ամենագողտրիկ անկյուններից մեկում՝ Սասունում: Սասունը պատմական Մեծ Հայքի Աղձնիք նահանգի տասներորդ գավառն է, որը տարածվում է Հայկական Տավրոս լեռների վրա: Սասունը լեռնային երկրամաս է, որի տարածքում են գտնվում հայտնի Ծովասար և Մարաթուկ լեռնագագաթները: Սասունցիներն աչքի են ընկել միայն իրենց տեսակին հատուկ համառությամբ, հայրենիք ու հող պաշտելով և մի փոքր էլ «ծուռ» լինելով:
Հայոց ազգային էպոսը փոխանցվել է բանասացների և վիպասացների միջոցով՝ տարբեր պատումների ձևով: Ինչպես, օրինակ՝ տարոնցի երեսփոխան Կրպոյից Գարեգին Սրվանձտյանը գրի է առել և այնուհետև 1874 թ-ին հրատարակել «Սասունցի Դավիթ կամ Մհերի դուռ» վերնագրով էպոսի պատումներից մեկը: Այնուհետև մոկացի Նախո Քեռի-ից 1889թ-ին Մանուկ Աբեղյանը գրի է առնում մեկ այլ տարբերակ և հրատարակում «Դավիթ և Մհեր» վերնագրով:
1939 թ-ին՝ վիպերգի ստեղծման 1000-ամյակի առթիվ, 60 պատումների հիման վրա կազմվել է միասնական, համահավաք բնագիր (հեղինակներ՝ Մանուկ Աբեղյան, Գևորգ Աբով, Արամ Ղանալանյան), որն ամբողջական և հստակ պատկերացում է տալիս էպոսի մասին:




Էպոսի բովանդակությունը

Էպոսում գործում են վիպական հերոսների չորս հիմնական սերունդ, որոնք միմյանց հետ կապված են ազգակցական կապերով: «Սասնա ծռերը» բաղկացած է վիպական 4 մասից կամ ճյուղից, որոնցից յուրաքանչյուրը կոչվում է հերոսների մեկ սերնդի անունով՝ «Սանասար և Բաղդասար», «Մեծ Մհեր», «Սասունցի Դավիթ» և «Փոքր Մհեր»:

Էպոսի առաջին հերոսները Սանասարն ու Բաղդասարն էին, նրանք հայոց Գագիկ թագավորի աղջկա՝ Ծովինարի զավակներն էին: Ծովինարը հայրենի հողը լքելուց առաջ մեկ լիքը բուռ և մեկ կիսատ բուռ ջուր էր խմել Կաթնաղբյուրից: Լիքը բռից ծնվում է խոշորակազմ և ուժեղ Սանասարը, իսկ կիսատ բռից՝ փոքրակազմ Բաղդասարը: Այնուհետև մեծանալով և հզորանալով եղբայրները կռվում են խալիֆայի զորքի դեմ, հաղթում նրան և փախչելով Բաղդատի խալիֆի իշխանությունից՝ գալիս են հայրենի Սասունում բերդ կառուցում, հզորացնում և շենացնում այն:

Սանասարին հաջորդում է իր որդիներից ամենաքաջը՝ Մհերը: Մեծ Մհերին նաև ասում էին Առյուծաձև Մհեր, քանի որ գոտեմարտել էր հսկա առյուծի հետ, որը փակել էր հացի ճանապարհը, և մեջտեղից երկու կես արել: Վիպասացները նկարագրում էին, որ ինչպես նժույգին հեծած Սանասարը «մեկ սար էր սարի վրա», այնպես էլ նրա որդի Մհերը «խոջա ամրոց էր նստած ձիու վրա»: Մհերը նաև մենամարտում հաղթում է Մըսրա Մելիքին և Սասունն ազատում հարկերից:


Տարիներ հետո, երբ Մելիքը մեռնում է, նրա կինը՝ Իսմիլ Խաթունը Մհերին խնդրում է, որ գա և տիրություն անի իր երկրին: Սակայն Իսմիլ Խաթունը խորամանկությամբ և արբեցնելով կարողանում է 7 տարի Մհերին պահել Մըսըրում և մի արու զավակ ունենալ նրանից, որին իր ամուսնու անունով անվանում է Մելիք: Հասկանալով իր սխալը՝ Մհերը նորից վերադառնում է Սասուն և նորից շենացնում այն: Որոշ ժամանակ անց ծնվում է Դավիթը, որին տուն բերելուն պես, Մհերն ու կինը մահանում են:

Սասնա ծռերի առաքինությունները կատարելության են հասցված Դավթի կերպարում, որին ժողովուրդը դարձրել է իր էպոսի առանցքային կերպարը: Էպոսում հենց Դավիթի կերպարի միջոցով են արտահայտվել հայ ժողովրդի վեհ գաղափարները, խոր հույզերն ու բոլոր նվիրական իղձերը: Հենց Դավիթն էր, ով կռվելով կրտսեր Մըսրա Մելիքի հսկայական զորքի դեմ, սրի մեկ հարվածով սպանում է նրան և Սասունն ազատում է հարկերից և արաբների իշխանությունից: Դավիթն ունենում է մեկ որդի՝ Փոքր Մհերը, որին մահից առաջ անիծում է, քանի որ մենամարտի էր բռնվել իր հետ՝ չիմանալով որ իր հայրն է:

Դավիթը Մհերին անիծում է, որ անմահ լինի և անժառանգ: Փոխարինելով հորը՝ Փոքր Մհերը քաջաբար պատերազմում է Դավիթի թշնամիների հետ և լուծում հոր վրեժը: Եվ իհարկե, կատարվում է հոր տված անեծքը և «Սասնա ծռեր»-ի վերջին հերոսն, այդպես էլ անժառանգ ծերանալով, փակվում է Ագռավաքարում և պատգամում.

Քանի աշխարք չար է,

Հողն էլ ղալբցեր (ծուլացել) է,

Մեջ աշխարքին ես չեմ մնա:

Որ աշխարք ավերվի, մեկ էլ շինվի,

Եբոր ցորեն էղավ քանց մասուր մի,

Ու գարին էղավ քանց ընկուզ մի,

Էն ժամանակ հրամանք կա, 

որ էլնենք էդտեղեն:

Եվ այսպես էլ Փոքր Մհերը, անժառանգ մնալով, ավարտում է հայկական հերոսավեպը:

Էպոսում գլխավոր հերոսների կողքին տեսնում ենք ժողովրդի իմաստությունը մարմնավորող Քեռի Թորոսին, Ձենով Օհանին, արտատեր պառավին, արաբ ծերունուն և այլ տարեց մարդկանց, որոնք իրենց խրատներով օգնում են Սասնա քաջերին:



Էպոսի առանձնահատկությունները
Բոլոր ազգային էպոսներն իրենց առջև դնում են պետականության խնդիրը, և եթե այն չունի պետականության խնդիր, ապա այն էպոս համարվել չի կարող: Հայկական ազգային էպոսում պետության և պետականության խորհրդանիշը համարվում է բերդը: Բերդի և հզոր պարիսպների կառուցումով էլ հենց էպոսի առաջին գլխավոր հերոսները՝ Սանասարն ու Բաղդասարը սկիզբ են դնում Սասնա տոհմին և Սասնա տանը:

Էպոսում նկարագրվող պատմական իրադարձությունները տեղի են ունենում արաբական տիրապետության ժամանակ, և նկարագրվում է սասունցիների պայքարն արաբ նվաճողների դեմ: Որոշ պատմական իրադարձություններ ու հերոսների անուններ համընկնում են: Սակայն պետք է նշել, որ հայկական էպոսի արմատները հասնում են հազարամյակների խորքը, երբ մարդն ուներ ամենապարզունակ ապրելակերպը: Այն իր մեջ խտացնում է պատմության տարբեր ժամանակահատվածներ ու մշակութային շերտեր:

Հայկական էպոսում հիշատակվում են թագավորը, իշխանը, հոգևորականը և ռամիկ ժողովուրդը: Սակայն նրանք բոլորն իրենց նիստ ու կացով, բարքերով և կրթությամբ գրեթե չէին տարբերվում: Թագավորը և ժողովուրդը մտերմիկ հարաբերությունների մեջ էին միմյանց հետ: Սասունցիները սիրում էին իրենց տերերին: Նրանց միջև միակ էական տարբերությունն այն էր, որ մեկը հրամայողն էր, իսկ մյուսը՝ լսողը:

Հայոց էպոսի հերոսները ոչ միայն պայքարում էին օտար նվաճողների դեմ, այլև օգնում գյուղացուն առօրյա աշխատանքներում: Նրանք գերմարդկային ուժով օժտված հսկաներ էին, որոնք մեծանում էին ոչ թե օր օրի, այլ ժամ առ ժամ: Եվ չնայած իրենց ֆիզիկական ուժի նրանք նաև աչքի էին ընկնում բարությամբ, միամտությամբ և պարզությամբ: Հենց այս պատճառով էլ էպոսի հերոսներին տրվել է «ծուռ» մականունը: Այսինքն էպոսի հերոսները վերացական կերպարներ չեն եղել, այլ իրական մարդիկ՝ իրենց թերություններով և առավելություններով:

«Սասնա ծռեր» էպոսը մեզ հաղորդում է հսկայական տեղեկություններ հայ ժողովրդի ապրելակերպի, ընտանիքի, ներընտանեկան և հասարակության մեջ փոխհարաբերությունների, կրոնական ընկալումների, ծիսական արարողակարգերի և հավատալիքների մասին:

Էպոսն ու հեթանոսությունը
Էպոսում երևում են կրակի պաշտամունքի հետքեր, որոնք բնորոշ են հեթանոսական շրջանին: Հանդիպում են նաև հնագույն ժամանակներից մնացած հավատալիքներ՝ ջրի, լույսի, հողի, երկնային լուսատուների և նախնիների պաշտամունք: Մեծ և Փոքր Մհերները կապվում են Միհր աստծո հետ: Առասպելում դա վառ արտահայտվում է Փոքր Մհերի կերպարի մեջ, ով համարվում էր էպոս մտած Միհր արեգակը:

Լուսնային և արեգակնային հատկանիշներով և գուշակության ու կախարդության շնորհներով էին օժտված նաև էպոսի կանայք՝ Դեղձուն Ծամը, Խանդութը և Գոհարը:

Սանասարը և Բաղդասարը կապվում են հայ առասպելաբանության մեջ ամպրոպային հերոսների հետ, որոնք, կռվելով ջրի ակունքը փակող հրեշի հետ, սպանում են նրան, և ազատում արեգակի աղջկան՝ այս դեպքում Դեղձուն Ծամին:

Էպոսում հիշատակվում է նաև ժողովրդի կողմից սիրված տոներից մեկը՝ Համբարձումը: Չնայած որ այն այժմ քրիստոնեական է, սակայն ունի հեթանոսական ծագում: Հնում այն համարվել է ջրի և ծաղկի տոն: Մարդիկ հավատում էին, որ գիշերվա ընթացքում ջրերը մեկ րոպե կանգ են առնում և հենց այդ գիշեր էլ ջրերն ունենում են բուժիչ հատկություն: Տոնի ժամանակ բախտախաղ էին խաղում և գուշակություններ անում:

Սասունցի Դավթի արձանը
Հայ ժողովուրդն այնքան է սիրել իր էպոսի հերոսներին, և հատկապես Սասունցի Դավթին, որ նրա անունով է կոչվում Երևանի մետրոյի կայարաններից մեկը: Կայարանի դիմաց կանգնեցված է նաև Սասունցի Դավթի արձանը, որի հեղինակն է հայտնի հայ քանդակագործ Երվանդ Քոչարը: Ներկային արձանը տեղադրվել է 1959 թվականի դեկտեմբերի 3-ին, սակայն սա արձանի երկրորդ տարբերակն էր: Արձանի առաջին՝ գիպսե, տարբերակը ստեղծվել էր 1939 թ-ին՝ էպոսի ստեղծման 100-ամյակի կապակցությամբ: Սակայն արձանի տեղադրումից հետո Քոչարը ձերբակալվեց, քանի որ իր պատրաստած արձանի հեծյալ հերոսի «մերկացրած» սուրը նայում էր դեպի Թուրքիան: Բանտարկությունից 2 տարի անց Քոչարը ազատ է արձակվում: Եվ արդեն 1959թ-ին տեղադրվում է Սասունցի Դավթի արձանի այժմյան տարբերակը:

Սակայն այս արձանը սովորական արձան չէ, այն իր մեջ մի քանի հետաքիրքական գաղտնիքներ է թաքցնում: Առաջինը ձիու պոչն է: Հնում սովորություն կար, որ պատերազմից առաջ ձիու պոչին պարան էին կապում, որպեսզի չխանգարեր, սակայն այս արձան վրա Քոչարը ոչ թե պարան, այլ քյամար (մուսուլմանական գոտի) է կապել: Եթե ուշադիր նայեք, կարող եք տեսնել, որ պոչը հստակ բաժանված է երկու մասի, որոնք էլ նման են կրկին լայն մուսուլմանական շալվար հագած զույգ ոտքերի: Եվ այնպիսի տպավորություն է ստեղծվում, կարծես թշնամին մարմնի կեսով մտած լինի ձիու հետույքը:

Մեկ այլ հետաքրքիր փաստ կապված է Դավթի թրի հետ: Դավիթը իր սուրը պահում է հորիզոնական, այլ ոչ թե ուղղահայաց: Քանի որ նա մենակ էր պատրաստվում կռվել թշնամու զորքի դեմ, հետևաբար չէր կարող նրանց մեկ մեկ սպանել, այլ պետք է արտի նման հնձեր նրանց:

Սասունցի Դավիթ դյուցազնավեպը վերածվել է նաև գեղեցիկ և պատկերազարդ մուլտֆիլմի: Որի միջոցով երեխաներին, դեռ մանկուց, հասցվում են ազգային էպոսի կարևոր գաղափարները:

«Սասնա ծռեր» էպոսը կամ «Սասունցի Դավիթ» ազգային դյուցազներգությունը մեր մշակույթի ամենաճանաչված կոթողներից է նաև ամբողջ աշխարհում: Դեռևս խորհրդային շրջանում այն թարգմանվել է բազում լեզուներով, իսկ 2012-ին ««Սասնա ծռեր» կամ «Սասունցի Դավիթ» էպոսի կատարողական դրսևորումները» հայտն ընդգրկվեց ՅՈՒՆԵՍԿՕ-ի մարդկության ոչ նյութական մշակութային ժառանգության ցուցակում:

Սույն հոդվածի հեղինակային իրավունքը պատկանում է armgeo.am կայքին։ Հոդվածի բովանդակությունը կարող է մեջբերվել, օգտագործվել այլ կայքերում, միայն ակտիվ հղում պարունակելով դեպի սկզբնաղբյուրը:





«ՍԱՍՈՒՆՑԻ ԴԱՎԻԹ» ԷՊՈՍԸ ԵՎ ԱԶԳԱՅԻՆ ԻՆՔՆՈՒԹՅՈՒՆԸ, Սասունցի Դավիթ Դյուցազնավեպը, որը ունի 4 ճյուղ,  բաղկացած է հնագույն առասպելներից, ավանդական վիպական սյուժեներից և ամբողջական վերամշակված և համաձուլված են որպես մեկ ամբողջություն: Սանասարի և Բաղդասարի ճյուղը ձևավորվել է եղբայրների և ամպրոպային վաղնջական առասպելների հիմքի վրա։ Մեծ Մհերի և Փոքր Մհերի ճյուղերի հիմքում ընկած են հին հայկական և հնդիրանական երկնային լույսի և արեգակի աստված Միհրի  Միթրայի առասպելաբանական մոտիվները՝ զուգորդված ժայռում փակված հերոսների տեղական հնագույն առասպելին։ Դավթի ճյուղի նախահիմքում ընկած է ամպրոպային կռվի հին հնդեվրոպական առասպելը։ Առասպելական հերոսներն ենթարկվել են փոփոխության տեղական ավանդության ու պատմական անցուդարձերի ուժեղ  ազդեցությամբ տակ:

Վիպական հերոսները և նրանց արարքները տեղայնացված են աշխարհագրական իրական միջավայրի հետ կապվելու համար։ Իրական տեղավայրերի և նրանց տիրողների միջև եղած թշնամական հարաբերություններն  ցույց են տալիս պատմական  որոշակի ժամանակաշրջան ։

Ճյուղերի միացումը և վերամշակումը կատարվել են միջնադարում՝ VII – XIII դդ., սկզբում Բաղդադի արաբ, խալիֆայության, ապա Եգիպտոսի (Մսրա) էյուբյան արաբ տիրակալների՝ XII –XIII դդ․, դեմ հայ ժողովրդի մղած ազատագրական պայքարի հզոր դրդումով և խոր ազդեցությամբ։

Սանասարի և Բաղդասարի ճյուղում երկվորյակների առասպելը նմանությամբ նախ կապվել է Ասորեստանի արքայազն եղբայրների՝ հորը սպանելու և Հայաստանում ապաստանելու պատմական ավանդության հետ, որոշ չափով պատմականացվել և իր մեջ ներառել մ․ թ․ ա․ VI դ․պատմական իրադարձություններ, ապա վիպական զարգացումով հետագայում կապվել է Բաղդադի արաբ, խալիֆաթի ժամանակների՝ VII– XI դդ․,  հետ և ձեռք բերել պատմական նոր երանգ։

Դավթի ճյուղի ստեղծման վրա ազդեցություն են թողել արաբների հարկային ծանր քաղաքականության դեմ ուղղված սասունցիների 749-ի և 851-ի ապստամբությունները ՝ առաջինը գլխավորել է Դադայի որդի Հովհանը, երկրորդը՝ Հովհան Բագրատունին և նրա հորեղբորորդիներ Դավիթն ու Աշոտը: Այդ և այլ անուններ դարձել են վեպի հերոսների անուններ՝ Զենով Հովհան, Դավիթ ։ Հերոսների հին թշնամիշները նույնպես  պատմականացվել են և  փոխարինվել տարբեր ժամանակների արաբ  տիրակալների հավաքական անուններով: 

Վիպասացները, լինելով ժողովրդի աշխատավոր խավերի ներկայացուցիչներ, իրենց գաղափարները, իղձերն ու ակնկալիքներն են ներդրել վիպական հերոսների հոգեբանության ու արարքների մեջ։


ԽԱՂԻ ՄՇԱԿՈՒՅԹԸ «ՍԱՍՆԱ ԾՌԵՐ» ԷՊՈՍՈՒՄ
*
(Շիրակի ավանդական խաղերի համադրությամբ)
ՀԱՍՄԻԿ ՄԱՏԻԿՅԱՆ, ԱՐԵԳՆԱԶ ՄԵԼԻՔՍԵԹՅԱՆ

* Հետազոտությունն իրականացվել է ՀՀ գիտության կոմիտեի ֆինանսական աջակցությամբ՝ 22YR-6B030 ծածկագրով գիտական թեմայի
շրջանակներում:

երեխայի մտածողությունն ու երևակայությունը, նրա հուզականությունը, ակտիվությունը, զարգացնում է հաղորդակցվելու կարողությունը: Խաղն ինքնուրույն գործունեություն է, որի ընթացքում երեխաները շփվում են իրենց հասակակիցների հետ: Նրանց միավորում են ընդհանուր նպատակին հասնելու համատեղ ջանքերը, ընդհանուր փորձը: Խաղի փորձառությունները խորը հետք են թողնում երեխայի մտքում և
նպաստում վեհ ձգտումների և կոլեկտիվ հմտությունների
ձևավորմանը: Հաճախ խաղը միջոց է դառնում նոր գիտելիքների հաղորդման, մտահորիզոնի ընդլայնման համար և մեծահասակների աշխատանքի նկատմամբ հետաքրքրություն
է առաջացնում՝ ուղղորդելով դեպի հասարակական կյանք:
Երեխաներն ունեն ապագա մասնագիտության նկատմամբ
իրենց առաջին երազանքները, սիրելի հերոսներին ընդօրինակելու ցանկությունը: Շատ դեպքերում խաղը հանգում է
նրան, որ ամենապարզ գործողությունները վերարտադրվում
են կենցաղով, որը երեխան յուրացրել է ինքնուրույն կամ մեծահասակների նմանակմամբ: Միևնույն ժամանակ, երեխան
շահագրգռված է գործողության ոչ թե ներքին բովանդակությամբ, այլ արտաքին՝ ընթացակարգային կողմով:
Բացի մանկան/երեխայի առօրյայի մաս կազմելուց, խաղի դրվագային դրսևորումներն առկա են նաև հայկական ժողովրդական էպոսում: Որքան էլ էպոսը բանահյուսության
վիպական ժանրի ստեղծագործություն է դյուցազունների աներևակայելի ուժի, իմաստնության, արդարամտության, աշխատասիրության և այլ օրինակելի հատկանիշներ ներառող,
այն, սակայն, զուրկ չէ հերոսների մանկությունը պատկերող
հատվածներից, որոնցում նրանց առօրյայի անբաժան մասն է
խաղը: Ըստ էպոսում խաղացած խաղերի՝ հնարավոր է պարզել հերոս-դյուցազունների՝ իրենց տարեկիցներից ունեցած
առավելությունները, մտավոր և ֆիզիկական ճկունությունն
ու հասունությունը, քանի որ էպոսում նրանք հաճախ այնպիսի խաղեր են խաղացել, որոնք բնորոշ են եղել մեծահասակ-

ներին, ինչը վկայում է հերոսների աներևակայելի ուժի, հզորության ու ճարպկության մասին:
Ցանկացած ստեղծագործություն, այդ թվում էպոսը, կարելի է քննել հորիզոնական և ուղղահայաց համատեքստերում: Հայտնի է, որ հորիզոնական համատեքստը նյութի բովանդակությունն է, վերջինիս ուղղակի ընկալումը, իսկ ուղղահայացը՝ թե ինչպես է ընկալում տեքստի բովանդակությունն ընթերցողը: Բերված կաղապարով քննենք էպոսի՝ Մելիքի գուրզով խաղալու դրվագը. վերջինս սպանելու դիտավորությամբ գուրզը նետում է Դավթի կողմը, իսկ Դավիթը
բռնում և հետ է շպրտում. սա հորիզոնական համատեքստն է:
Ուղղահայաց համատեքստում, սակայն, մեր կարծիքով,
թաքնված է խորքային ասելիքը. նախ՝ գուրզով խաղալու համար անհրաժեշտ էր դյուցազնական ուժ և հմտություն, իսկ
Դավիթը դեռ մանուկ էր, և զարմանալի էր նրա՝ գուրզը բռնելու
և նետելու հմտություն ունենալը, ապա՝ Մելիքի չար դիտավորության ձախողումը Դավթի դյուցազնական ուժի և ճարպկության շնորհիվ՝ վկայում է վերջինիս ի բնե զորնդեղ լինելու,
պայքարող ու հաղթող ազգի արժանի զավակը լինելու մասին:
Հետաքրքրական է էպոսի վերոնշյալ հատվածի Կարնո
բարբառի Գյումրվա խոսվածքի փոխադրված տեքստը.
Էլի զօռէց: Վարբեդը տէսավ՝
Հ՛ուրիշ հընար չըկա, էլի ընդէղ տարավ:
Դավիտը տէսավ, օր մարտիգ էլի հավակվէ,
Կը խաղային.
Էլի գ՛ուրզ կը քըցէին:
Հասավ, էդ գ՛ուրզը բ՛ռնէց, թաբլէց.
Հ՛ամէն թաբլելուց յէռսուն գ՛ազ կանցընէր:
Էլի Շուն Մէլիկը մարտ ղըրգէց, թէ.
-Տէսէ՛ք՝ էս վօվ է օր իմ գ՛ուրզըս բ՛ըռնէց1

ենք նշել, որ մանկական խաղը տարածական է էպոսի երրորդ՝ «Սասունցի Դավիթ», ճյուղում: Էպոսում Դավթի մանկության պատմությունները առավել հանգամանորեն են
նկարագրված. վաղ մանկությունից մինչև պատանեկություն:
1990 թվականին լույս տեսած «Սասունցի Դավիթ» հայկական
ժողովրդական էպոսում նկարագրվում է, որ դեռևս Մըսրում
եղած ժամանակ Դավիթը գուրզի է խաղացել՝ բռնելով և նետելով Մելիքի «իրեք հարիր վաթսուն ու վից լիդր» կշռող
գուրզը:
Իսկուն Դավիթ իր ձեռ տվեց առջև
Ու գուրզ բռնեց.
Որ գուրզ բռնեց՝ ծանր-թեթև արավ,
Ասաց.- Ափսո՜ս, հազա՜ր ափսոս,
Մի քիչ թեթև է էսա գուրզ1
:
Էպոսի խաղերից է նաև ջրինդը, խաղացել են Մըսրում.
սկզբում մեծերը՝ Մելիքի գլխավորությամբ, ապա խաղի մեջ
ակամա ներգրավվում է նաև մանուկ Դավիթը: Նույն հրատարակության բնագրում ասվածը ներկայացվում է այսպես.
Կայնելուն պես տեսավ՝ էրգնուց բան մի կը գա:
Տեսավ՝ ջրինդ կը գա իր մոտ:
Ջրինդ կը թալեին: Ջրինդ Մըսրա Մելիքն էր:
Դավիթ հասավ, ջրինդ բռնեց,
Թալեց՝ գնաց տաս գազ անցուց Մելքի գլխով2
:
Էպոսի հերոսները նաև հոլ են խաղացել.
Ասաց.- Մե՜ր մեռնի քեզ,
Կ՛էրթա իրա սեյրանատեղ, ու իրիկուն կը գա.
Կ՛էրթա հոլ կը խաղա:

1 Հայկական ժողովրդական էպոս, Սասունցի Դավիթ, «Արևիկ» հրատ.,
Եր., 1990, էջ 223:
2 Նույն տեղում, էջ 217:

–Ապա ինչի ինձ չի՜ տանի,
Որ իմ միտք էլ քիչ մի բացվի1
:
Բերված հատվածում տեսանելի է նաև, որ խաղն ընկալվել է ոչ միայն սոսկ զբաղմունք՝ ժամանակ անցկացնելու միջոց, այլև խորապես գիտակցվել է դրա զարգացնող, կատարելագործող դերը:
Հարկ է նշել, որ էպոսում նկարագրված հոլը՝ որպես խաղատեսակ, Շիրակում այժմ կենսունակ է: Խաղացողները
հիմնականում տղաներն են՝ սկասծ 10 տարեկանից: Խաղում
են նաև երիտասարդները՝ ներկայացնելով այն որպես Շիրակի մշակույթի անբաժան մաս:
Ստեփան Մալխասյանցն այսպես է բացատրում հոլ բառը՝ առաջին իմաստով. «Հոլ-կոնաձև փոքր փայտէ խաղալիք,
ծայրին կոնաձև մեխ խփած, որը ողորկ գետնի կամ սառոյցի
վրայ սուր ծայրով դնելով՝ մտրակի հարուածներով պտտեցնում են»
2
: Թե՛ խաղալիքը, թե՛ խաղի նկարագրությունը մինչ
այժմ պահպանված է Շիրակում:
Խաղը, առհասարակ, թե՛ էպոսում, թե՛ Շիրակում և հարակից բնակավայրերում ունի որոշակի դրսևորումներ և
նպատակադրումներ, դրանցից են.
1. մանկանն զբաղեցնելու
2. կարողությունները դրսևորելու
3. զարգացնելու
4. անհատի դրսևորման
5. աշխարհաճանաչողությանը նպաստելու
6. արժեհամակարգի ձևավորման
7. սոցիալականացման և այլն:
Էպոսում խաղացված խաղերը հիմնականում պայմանավորված են այն միջավայրով և կենցաղով, որով ապրել են
հերոսները: Արդեն Սասունում հովիվ Դավիթը ճան է խաղում: Խաղաքարը ոչխարի հետին ծնկահոդի ոսկորն է՝ ճանը,

1 Նույն տեղում, էջ 218:
2 Մալխասյանց Ստ., Հայերէն բացատրական բառարան, Եր., 1944թ.

որը հանվում է նախքան միսը եփելը, որպեսզի պահպանի
անհրաժեշտ ծանրությունը: Վերոբերյալ բնագրում ասվում է.
Դավիթ գնաց մոտ ճժերուն, խաղաց:
Ճժեր լեպ արին, ճաներ զամեն մոտեն տարան:
Դավիթ ապտակ մ՛էզար իշխանաց լաճերուն,
Լաճու մի վիզ ծռվեց1
:
Ճան կամ վեգ խաղը կենցաղավարել է Շիրակի այն գյուղերում, որտեղ բնակչության հիմնական զբաղմունքներից
մեկը անասնապահությունն է եղել: Շիրակի գյուղերում տարածված են եղել նաև որոշ խաղեր, որոնք խաղացել են ոչ
միայն գյուղի փոքրերը, այլև տվյալ գյուղի մեծերը հարևան
գյուղի մեծերի հետ: Խաղացել են թե՛ որպես զբաղմունք, թե՛
որպես կատակ՝ հանաք, որ առավել քան բնորոշ է շիրակցուն: Իսկ այն գյուղը, որի խաղացողները պարտվել են, հաղթողների համար ակամա հումորի անսպառ նյութ են դարձել:
Ճանը, հոլը և այլ խաղեր բնութագրական են եղել ոչ
միայն Շիրակում, այլև շրջակա տարածքներում: Հաճախ
դարձել են գրական մշակման նյութ: Բերված խաղերին անդրադարձել են հայ գրողները: Վահան Թոթովենցը գրում է.
«Շեմսին մեր թուրք հարևանի որդին էր, որի հետ մենք հասակակից էինք, գրեթե միասին էինք մեծացել: Մեծացել էինք
երկու եղբոր պես. իրար վեգ էինք տվել, տնից վերցրած քաղցրավենիքներ էինք հյուրասիրել իրարու»
2
:
Հովհ. Շիրազի «Սիամանթո և Խջեզարե»-ում կարդում
ենք.
Թե՞ ուրիշն է ձգել վեգերն այս ոսկյա...
— Ո՞վ կձգի... Չէ, եկել է, նա է ձգել կա-չկա,
Բայց ի՞նչ վեգ է, հա, հիշեցի, թեև յոթն օր չի անցել

1 Հայկական ժողովրդական էպոս, Սասունցի Դավիթ, «Արևիկ» հրատ.,
Եր., 1990թ., էջ 242:
2 Թոթովենց Վահան, Երկեր երեք գրքով, գիրք 1, Կյանքը հին
հռովմեական ճանապարհի վրա, Եր., «Սովետական գրող» հրատ, 1988,
էջ 483:

— Սիամանթո, Հայի տղա,
Վայ լո՛, դլեյաման–յաման,
Դու չէ, Հայրս է վայի տղա,
Վայ լո՛, դլեյաման-յաման1
:
Ստեփան Զորյանը իր պատմվածքում անդրադարձ ունի.
«Դա էլ ծանոթ էր թվում Ծովանին. ճամփան, տները, ծառերը - բոլորը ծանոթ էին կարծես: Ճանապարհի երկու կողմը
մարդիկ հավաքված խոսում էին, երեխաները վեգ էին խաղում: Երբ Ծովանը զգույշ քայլերով մոտեցավ նրանց, հանկարծ լսեց իր անունը, ու փափախով մի մարդ առաջը
կտրեց»: Նույն հեղինակը իր «Մի կյանքի պատմություն» ինքնակենսագրականում գրում է. «Սամսոնը մենակ է: Ես ուրախ-ուրախ անցնում եմ նրանց բակը, այնտեղից պատշգամբ, ու խաղում ենք վեգ, գնդակ, ինչ պատահում է: Սամսոնը փոքրիկ քառանիվ սայլակ ունի, հերթով նստում ենք ու
քաշում իրար կա՛մ բակում, կա՛մ պատշգամի մի ծայրից
մինչև մյուս ծայրը»:
Այսպիսով, ընդհանրացնենք. էպոսում բերված խաղերը
շարունակել են կենցաղավարել թե՛ գրական ստեղծագործություններում, թե՛ Շիրակում, ընդ որում, դրանցից որոշները հասել են մինչև մեր օրեր:
Խաղը մտավոր դաստիարակության կարևոր միջոց է:
Վերարտադրելով կյանքի տարբեր իրադարձություններ,
դրվագներ հեքիաթներից՝ երեխան արտացոլում է այն, ինչ
տեսել է, ինչ կարդացել ու պատմել են: Այսպիսով, խաղի միջոցով ընդհանրանում և խորանում է երեխաների հետաքրքրությունը տարբեր մասնագիտությունների նկատմամբ, դաստիարակում հարգանք աշխատանքի նկատմամբ:
Խաղերի ճիշտ կառավարումը որոշիչ նշանակություն ունի երեխայի հոգեկանի զարգացման, նրա անհատականության ձևավորման գործում:





<<Սասնա բարբառի բացատրական բառարան>>


Բերդ-Կապույտ — գտնվում էր Մեծ Հայքի Այրարատ նահանգի Երասխաձոր (Արշարունիք) գավառում: Եղել է Հայոց Արշակունիների ռազմական կարևոր հենակետ։

Տեղտիս — Դեղձիս կամ Դեղձենց քաղաք Վանի նահանգում, Գավաշի գավառում

Նորագեղա դաշտ — առասպելական վայր

Մուշ — քաղաք Արևմտյան Հայաստանում, Բիթլիսի նահանգի Մշո գավառում։

Արզրում — Քաղաք Մեծ Հայքի Բարձր Հայք աշխարհի Կարնո գավառում, Կարնո սարահարթում, Եփրատ գետի ձախ կողմում, Այծպտկունք լեռան հյուսիսարևմտյան լանջերին

Մանազկերտու բերդ — Մանազկերտ գյուղաքաղաքը հին ժամանակներուն Մալազկիրթ / Մանազկերտ անունով էր ծանոթ, պատմական Հայաստանի ամենաանառիկ բերդերից մեկն էր՝ աշտարակների և պարիսպների պատճառով։ Ըստ առասպելի, գյուղաքաղաքի անունը կապում են Ուրարտուի թագավոր Մենուայի անվան հետ: Սակայն մեկ այլ առասպելի համաձայն, գյուղաքաղաքն կոչված է Հայկ նահապետի որդու՝ Մանավազի, հետ:

Սասուն — գավառակ Արևմտյան Հայաստանում, Բիթլիսի վիլայեթի Գենջի գավառում։

Բաղդադ — Իրաքի մայրաքաղաք: Գտնվում է Տիգրիս գետի ափին։ Հիմնադրվել է 8-րդ դարում որպես Աբբասյան խալիֆայության մայրաքաղաք: Միջին դարում Բաղդադը դարձել է իսլամության կենտրոնը և աշխարհի խոշորագույն քաղաք

Սեղանասար — Ջեյնար (ի)-Աթեշ, լեռ Հայաստանի Կոտայքի մարզում, Գեղամա լեռնաշղթայի հյուսիս արևմտյան հատվածում:

Անգղաձոր — Անգղ, Անկղ, գյուղ Արևմտյան Հայաստանում, Վանի վիլայեթի Հայոց ձորի գավառում: Գյուղի միջով հոսում է նույնանուն գետակը։

Մըսըր — Եգիպտոս՝ Ջումհուրիյատ Մըսր ալ-Արաբիյա կամ մասրի՝ գումհուրիյատ Մասր ալ-Արապիյա: Սահմանակից էր Սասունին և նրա սահմանների մեջ են Դիարբեքիրը և Հալեպը:

Պղնձե քաղաք — վիպական տեղանուն

Քաջանց երկիր— վիպական տեղանուն

Կանաչ քաղաք — վիպական տեղանուն

Իրան-Թուրան — նաև հայտնի որպես Պարսկաստան, պաշտոնապես Իրանի Իսլամական Հանրապետություն

Ծովասար —  համարվում է Ծովասարի լեռնաբազուկի բարձր գագաթը: Ծովասարի լեռները գտնվում են Հայկական Տավրոս լեռնահամակարգում, Սասունի լեռներում, Սասունի Շատախ և Տալվորիկ շրջանների միջև: եռը Ծովասար է կոչվել իր գագաթամերձ հատվածում ունեցած լճակի պատճառով, հարուստ է մարգագետիններով և աղբյուրներով: Որոշ պատումների մեջ հիշատակվում է իբրև հերոսների զբոսավայր («սեհր անելու տեղ») կամ որսատեղի։

Մարութա սար — գտնվում է Հայկական լեռնաշխարհում՝ Սասուն գավառում: Եղել է սասունցիների սիրած և պաշտելի սարը։ Կոչվել է նաև Մարաթուկ։ «Սասունցի Դավիթ» էպոսում պատմվում է, որ վանքը կառուցել է տվել Մհերը և ինքն էլ դրել է վանքի անունը Մարութա Բարձր Աստվածածին: Ընդունված է այն տեսակետը, թե Մարութա անվանումը գալիս է արամեերեն Մարութա բառից, որը նշանակում է իմ աշխարհի տերը:

Բաթմանա գետ — Փրե Բաթման գետն անցնում է Սասունի հարավային կողմով և թափվում է Տիգրիսի մեջ: Բաթմանա գետի և նրա կամրջի հետ կապվում են հնագույն ավանդություններ Գրիգոր Լուսավորչի հրաշքների, կործանված հեթանոսական մեհյաններից հալածված դևերի մասին։

Վան — նախկին հայկական քաղաք, ներկայում քրդաբնակ քաղաք Թուրքիայի Հանրապետության Վանի մարզում՝ Վանա լճի արևելյան ափին։


Բիթլիս— նահանգ է ներկայիս Թուրքիայի Հանրապետության արևելյան մասում, պատմական Արևմտյան Հայաստանում, Մեծ Հայքի Աղձնիք նահանգում։ Իբրև առանձին վարչական միավոր ձևավորվել է 16–րդ դարի սկզբում որպես հյուքյումեթություն (իշխանություն), որի մեջ մտնում էին Սասունը, Մուշը, Խիզանը, Խնուսը, Խլաթը, Արծկեն։

Կարս — քաղաք Թուրքիայի Հանրապետության արևելյան մասում՝ պատմական Արևմտյան Հայաստանում, Կարսի մարզկենտրոնն է։ Կարսը սկզբում բերդ է եղել, և հայ պատմիչներն այն հենց այդպես էլ ներկայացնում են՝ «Բերդ Կարուց»։ 9 — 13-րդ դարերում բերդի շուրջն էլ ծավալվել է քաղաքը, իսկ այն վերածվել է միջնաբերդի։

Ոստան — գավառ Մեծ Հայքի Այրարատ նահանգում, «ոստան» բառը նշանակում է՝ «իշխանանիստ» կամ «թագավորանիստ», իր անունը, հավանաբար, ստացել է, որ գավառում են գտնվում Արտաշատ և Դվին քաղաքները, որոնք Արտաշեսյանների և Արշակունիների թագավորությունների ժամանակաշրջանում եղել են Հայաստանի մայրաքաղաքներ։

Կապուտկող — լեռնագագաթ Հայկական լեռնաշխարհում, Հայկական Տավրոս լեռնահամակարգում, Վանա լճի հարավային կողմում։ Ըստ ավանդության՝ Մծբինի Հակոբ հայրապետը Ըձաքարի կատարից անիծել է Ռշտունիք իշխան Մանաճիհրին, որը ծովն էր նետել նրա անմեղ սարկավագներին։ Իբրև այդ անեծքից հետո Ռշտունիքում երեք տարի երաշտ է եղել:

Կաղզվան —  քաղաք և շրջան ներկայիս Թուրքիայի Հանրապետության Կարսի մարզի կազմում։ Հայտնի է նաև Երասխաձորի բերդ անունով։ Ենթադրվում է, որ այն սկզբում հավանաբար կոչվել է Կաղզովան։

Խլաթի երկիր — պատմական քաղաք Մեծ Հայքի Տուրուբերան նահանգի Բզնունիք գավառում։ Խլաթը Հայաստանի հնագույն բնակավայրերից է և դժվար է ասել, թե այն երբ է հիմնադրվել։ Սկզբում հիշատակվում է որպես ավան, իսկ հետագայում վերածվում է խոշոր քաղաքի, որ ուներ իր ամուր բերդը և համարվում էր Վանա լճի ամենամեծ նավահանգիստը։

Մոսուլի թագավորություն — քաղաք Իրաքի հյուսիսում, Տիգրիս գետի աջ ափին: Մոսուլը հիմնադրվել է 6-րդ դար, ավերված Նինվեի մոտ։

Դյուրջիստան — Վրաստան

Թավրիզ — քաղաք է Իրանի հյուսիս-արևմուտքում, Աջիչայ գետի հովտում: Հիմնադրել են Սասանյանները 3-4 դդ.։ Ենթադրում են, որ անվանումն առաջացել է հին պարսկերեն թեբրիզ «տենդը վանող» բառից

Խոյ — քաղաք ներկայիս Իրանի հյուսիս-արևմուտքում, Արևմտյան Ադրբեջան նահանգում, Կապուտան լճից դեպի հյուսիս, Կոտուր գետի միջին հոսանքի ձախ կողմում: Ենթադրվում է, որ Խոյը համապատասխանում է Պևտինգերյան քարտեզի հին Գոբդի ճանապարհային կայանին։ Միջին դարերում որոշ ժամանակ Խոյը Արծրունյաց իշխանների մի ճյուղի ոստանն էր, բարգավաճ քաղաք և ամուր բերդ։

«Սասնա ծռեր» էպոսում Խաչ պատերազմինը (կամ Պատերազմախաչը) պարզապես զարդ կամ խորհրդանիշ չէ, այլ Դավթի և մյուս հերոսների հաղթանակի ու գերբնական ուժի գլխավոր աղբյուրը։ Այն սերտորեն կապված է Արևխաչի հնագույն իմաստի հետ, քանի որ մարմնավորում է արևային, կենսատու և պաշտպանող էներգիան, որը պատերազմի դաշտում վերածվում է անպարտելիության։
Էպոսում դրա առանցքային նշանակությունը պայմանավորված է մի քանի պատճառով։ Նախ, այն հանդես է գալիս որպես աստվածային հովանավորության նշան։ Խաչը հայտնվում է Դավթի աջ բազկին՝ դառնալով նրա ուժի կնիքը։ Սա ցույց է տալիս, որ հերոսը չի գործում միայնակ. նրա թիկունքին կանգնած է վերին զորությունը։ Երբ Դավիթը մոռանում է Խաչ պատերազմինի մասին կամ այն թուլանում է, նա դառնում է խոցելի, իսկ երբ հիշում ու կանչում է դրա զորությունը, վերագտնում է իր հզորությունը։
Երկրորդ՝ այն խորհրդանշում է ժառանգականությունը և ինքնության պահպանումը։ Խաչ պատերազմինը, Թուր Կայծակին և Քուռկիկ Ջալալին այն սուրբ եռամիասնությունն են, որոնք փոխանցվում են Սասնա տան սերունդներին։ Սա կապում է հերոսին իր արմատների և տոհմական առաքելության հետ՝ հիշեցնելով, որ նրա կռիվն արդար է և ուղղված է հայրենիքի պաշտպանությանը։
Բացի այդ, Խաչ պատերազմինը էպոսում ունի զարթոնքի և զգոնության դեր։ Այն կարծես հերոսի ներքին կրակն է, որը բռնկվում է վճռորոշ պահերին։ Ինչպես Արևխաչն է խորհրդանշում արևի հավերժական պտույտը, այնպես էլ Պատերազմախաչը էպոսում մարմնավորում է հայ տեսակի անպարտելիությունը. այն երբեք չի վերանում, այլ ննջում է հերոսի մեջ՝ պատրաստ արթնանալու ամեն անգամ, երբ վտանգվում է արդարությունը։

«Սասնա ծռերում» Դավթի կանչը պատահական չէ. այն միավորում է քրիստոնեական սրբությունը (Մարութա Բարձր Աստվածածինը) և հնագույն, նախաքրիստոնեական արմատներ ունեցող զորությունը (Խաչ պատերազմինը)։

​Երբ հերոսը կանչում է իր աջ թևի խաչը, նա կարծես դիմում է իր ներքին ուժին և տոհմական հիշողությանը։ Էպոսում Խաչ պատերազմինը հաճախ նկարագրվում է որպես մարմնի վրա հայտնվող կամ նյութականացող նշան, որը սկսում է փայլել կամ զորանալ հենց այն պահին, երբ հերոսը գիտակցում է իր առաքելությունը։ Դա միայն ֆիզիկական զենք չէ, այլ բարոյական և հոգևոր զրահ։

​Հետաքրքիր է, որ այս երկու սրբությունները հանդես են գալիս միասին։ Մարութա Բարձր Աստվածածինը խորհրդանշում է տեղի՝ հայրենի հողի պաշտպանությունը (քանի որ Մարութա սարը և նրա վրայի վանքը Սասնա աշխարհի սիրտն էին), իսկ Խաչ պատերազմինը՝ անհատական անպարտելիությունը։ Սա այն պահն է, երբ հերոսը հաղթահարում է իր մարդկային վախերը և դառնում տիեզերական արդարության գործիք։

let currentPage = 0;
const maxPage = pages.length - 1;

function updateZ(){

pages.forEach((page,i)=>{

if(i < currentPage){
page.style.zIndex = 10 + i;
}else{
page.style.zIndex = 100 - i;
}

});

}

updateZ();

pages.forEach((page,i)=>{

page.addEventListener("click",()=>{

if(i === currentPage && currentPage < maxPage){

page.classList.add("flipped");

sound.currentTime = 0;
sound.play();

if(currentPage === 0){
setTimeout(()=>{
spine.classList.add("show");
},1600);
}

currentPage++;
updateZ();
}


else if(i === currentPage - 1){

page.classList.remove("flipped");

sound.currentTime = 0;
sound.play();

if(currentPage === 1){
setTimeout(()=>{
spine.classList.remove("show");
},150);
}
currentPage--;
updateZ();

}

});

});

if(e.ctrlKey && (
e.key === "c" ||

e.key === "s" || 
e.key === "a"
)){
e.preventDefault();
}

});

function splitTextToPages() {

  const textBlocks = document.querySelectorAll(".text");
  let paragraphs = fullText.split("\n").filter(p => p.trim() !== "");

  let pIndex = 0;

  textBlocks.forEach(block => {

    let savedImage = "";

    /* если custom-page — сохранить картинку */
    if(block.classList.contains("custom-page")){
      const img = block.querySelector("img");
      if(img) savedImage = img.outerHTML;
    }

    block.innerHTML = savedImage;

    while (pIndex < paragraphs.length) {

      let p = document.createElement("p");
      p.innerText = paragraphs[pIndex];

      block.appendChild(p);

      if (block.scrollHeight > block.clientHeight) {
        block.removeChild(p);
        break;
      }

      pIndex++;
    }

  });

}
splitTextToPages();
